services:
  - type: web
    name: godavari-fish-backend
    runtime: node
    repo: https://github.com/prem9621/godavari-fish
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: godawarifish189@gmail.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin
      - key: DATABASE_PATH
        value: /opt/render/project/src/backend/data/godavari.db
      - key: UPLOADS_DIR
        value: /opt/render/project/src/backend/uploads
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1